<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Countdown</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, sans-serif;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
  }

  .header {
    font-size: 22px;
    font-weight: bold;
    color: #a46363;
    margin-bottom: 20px;
  }

  .timer {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .box {
    padding: 10px 14px;
    min-width: 70px;
    background: transparent;
    color: #a46363;
  }

  .num {
    font-size: 40px;
    font-weight: bold;
    display: block;
  }

  .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>

<body>
<div class="wrap">
  <div class="timer">
    <div class="box"><span id="days" class="num">0</span><span class="label">Days</span></div>
    <div class="box"><span id="hours" class="num">0</span><span class="label">Hours</span></div>
    <div class="box"><span id="minutes" class="num">0</span><span class="label">Minutes</span></div>
    <div class="box"><span id="seconds" class="num">0</span><span class="label">Seconds</span></div>
  </div>
</div>

<script>
const target = new Date('Jul 27, 2026 08:30:00').getTime();

function update() {
  const now = new Date().getTime();
  const diff = target - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
