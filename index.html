<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Explorer</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      gap: 15px;
    }

    a.card {
      display: block;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    a.card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Widget Explorer</h1>
    <p>Choose a widget to explore</p>

    <div class="grid">
      <a class="card" href="greetings/index.html">
        👋 Greeting Widget
        <div class="tag">Simple interactive greeting</div>
      </a>

      <a class="card" href="pw-countdown/index.html">
        ⏳ Countdown Widget
        <div class="tag">Live countdown timer</div>
      </a>

      <a class="card" href="photo-gallery/index.html">
        🖼️ Gallery Widget
        <div class="tag">Image gallery viewer</div>
      </a>
    </div>
  </div>
</body>
</html>
